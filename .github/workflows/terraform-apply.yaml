name: terraform-apply

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

env:
  GCP_REGION: asia-northeast1
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  TFACTION_IS_APPLY: "true"
  TFACTION_JOB_TYPE: terraform
  TFACTION_TARGET: infra/prod
  TF_STATE_PREFIX: prod/infra/terraform
  TFACTION_WORKING_DIR: infra/terraform
  TERRAFORM_APPLY_SERVICE_ACCOUNT: leetdaily-terraform-apply@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
  TF_CLI_ARGS_init: >-
    -backend-config=bucket=${{ vars.TF_STATE_BUCKET }}
    -backend-config=prefix=prod/infra/terraform
  TF_VAR_container_image: ${{ vars.LEETDAILY_CONTAINER_IMAGE }}
  TF_VAR_discord_token_secret_id: ${{ vars.LEETDAILY_DISCORD_TOKEN_SECRET_ID }}
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: asia-northeast1

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check required repository variables
        id: check
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_TERRAFORM_APPLY_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_TERRAFORM_APPLY_WORKLOAD_IDENTITY_PROVIDER }}
          LEETDAILY_CONTAINER_IMAGE: ${{ vars.LEETDAILY_CONTAINER_IMAGE }}
          LEETDAILY_DISCORD_TOKEN_SECRET_ID: ${{ vars.LEETDAILY_DISCORD_TOKEN_SECRET_ID }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          missing=""
          for key in \
            GCP_PROJECT_ID \
            GCP_TERRAFORM_APPLY_WORKLOAD_IDENTITY_PROVIDER \
            LEETDAILY_CONTAINER_IMAGE \
            LEETDAILY_DISCORD_TOKEN_SECRET_ID \
            TF_STATE_BUCKET
          do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=terraform-apply skipped::Missing repository variables:$missing"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

  terraform-apply:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-apply-infra-prod
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install aqua-managed tools
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_TERRAFORM_APPLY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.TERRAFORM_APPLY_SERVICE_ACCOUNT }}

      - name: Set up tfaction
        uses: suzuki-shunsuke/tfaction/setup@4562d910bbacecf384c8aeda25332284fcf05f38 # v1.20.1
        with:
          github_token: ${{ github.token }}

      - name: Terraform apply
        uses: suzuki-shunsuke/tfaction/apply@4562d910bbacecf384c8aeda25332284fcf05f38 # v1.20.1
        with:
          github_token: ${{ github.token }}

  terraform-apply-skipped:
    needs: preflight
    if: needs.preflight.outputs.configured != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip terraform apply until bootstrap variables are configured
        run: |
          echo "terraform-apply is skipped until the required repository variables are configured."
          echo "Run infra/bootstrap, then set GCP_PROJECT_ID, GCP_TERRAFORM_APPLY_WORKLOAD_IDENTITY_PROVIDER, TF_STATE_BUCKET, and the application variables."
