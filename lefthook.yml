pre-commit:
  jobs:
    - name: gofmt
      glob: "**/*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    - name: terraform-bootstrap-fmt
      root: infra/bootstrap
      glob:
        - "infra/bootstrap/*.tf"
        - "infra/bootstrap/**/*.tf"
      run: terraform fmt -check -recursive

    - name: terraform-app-fmt
      root: infra/terraform
      glob:
        - "infra/terraform/*.tf"
        - "infra/terraform/**/*.tf"
      run: terraform fmt -check -recursive

    - name: workflow-lint
      glob: ".github/workflows/*.{yml,yaml}"
      run: make workflow-lint

pre-push:
  jobs:
    - group:
        parallel: true
        jobs:
          - name: go-fmtcheck
            glob:
              - "*.go"
              - "**/*.go"
            run: make fmtcheck

          - name: go-vet
            glob:
              - "*.go"
              - "**/*.go"
            run: make vet

          - name: go-test
            glob:
              - "*.go"
              - "**/*.go"
            run: make test

          - name: workflow-lint
            glob: ".github/workflows/*.{yml,yaml}"
            run: make workflow-lint

          - name: terraform-check
            glob:
              - "infra/bootstrap/*.tf"
              - "infra/bootstrap/**/*.tf"
              - "infra/terraform/*.tf"
              - "infra/terraform/**/*.tf"
            run: make terraform-check

commit-msg:
  commands:
    commitlint:
      run: aqua exec -- commitlint -g .commitlintrc.yml -e {1}
